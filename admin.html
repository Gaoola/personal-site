<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Panel — Student Advising</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f3ee;--bg2:#f0ebe3;--bg3:#e8e1d7;--border:#d6cfc4;
      --text:#1a1a18;--muted:#6b6560;--faint:#9c958d;
      --accent:#2d6e35;--accent-dim:#c8deca;--accent-bg:#edf5ee;
      --gold:#a07820;--gold-bg:#fdf6e3;--gold-border:#e8d49a;
      --error:#d32f2f;--error-bg:#ffebee;
      --serif:'DM Serif Display',Georgia,serif;
      --sans:'DM Sans',sans-serif;
      --mono:'DM Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;font-weight:300;line-height:1.6;overflow-x:hidden;min-height:100vh}

    /* Password Screen */
    #passwordScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;opacity:1;transition:opacity .3s}
    #passwordScreen.hidden{display:none}

    .password-box{
      background:#fff;border:1px solid var(--border);border-radius:4px;padding:3rem;
      max-width:380px;width:90%;box-shadow:0 4px 16px rgba(0,0,0,.08);
      opacity:0;animation:fadeUp .5s .1s ease forwards;
    }
    .pw-label{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:block}
    .pw-title{font-family:var(--serif);font-size:1.6rem;margin-bottom:.5rem;font-weight:400}
    .pw-sub{font-size:.95rem;color:var(--muted);margin-bottom:2rem;line-height:1.7}
    .pw-input{width:100%;padding:.8rem 1rem;border:1px solid var(--border);border-radius:2px;font-size:1rem;margin-bottom:1.2rem;font-family:var(--mono)}
    .pw-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
    .pw-btn{width:100%;padding:.7rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:2px;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s}
    .pw-btn:hover{background:#245929;transform:translateY(-1px)}
    .pw-error{color:#d32f2f;font-size:.85rem;margin-top:.5rem}
    .pw-back{color:var(--muted);font-size:.85rem;margin-top:1rem;text-align:center}
    .pw-back a{color:var(--accent);text-decoration:none}
    .pw-back a:hover{text-decoration:underline}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    .container{max-width:1000px;margin:0 auto;padding:2rem}

    h1{font-family:var(--serif);font-size:2.2rem;margin-bottom:2rem;margin-top:2rem}
    h2{font-family:var(--serif);font-size:1.5rem;margin:1.5rem 0 1rem}

    .section{background:#fff;border:1px solid var(--border);border-radius:4px;padding:2rem;margin-bottom:2rem}

    input,textarea,select{width:100%;padding:.7rem;margin-bottom:1rem;border:1px solid var(--border);border-radius:2px;font-family:var(--sans);font-size:.95rem}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .form-row input{margin-bottom:0}

    .btn{padding:.7rem 1.4rem;background:var(--accent);color:#fff;border:none;border-radius:2px;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s}
    .btn:hover{background:#245929;transform:translateY(-1px)}
    .btn-danger{background:var(--error)}
    .btn-danger:hover{background:#b71c1c}
    .btn-secondary{background:var(--muted);color:#fff}
    .btn-secondary:hover{background:#565250}

    .student-list{list-style:none;margin:1rem 0}
    .student-item{
      display:flex;justify-content:space-between;align-items:center;
      padding:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:2px;
      margin-bottom:.5rem;
    }
    .student-info{flex:1}
    .student-name{font-weight:500;margin-bottom:.2rem}
    .student-pwd{font-family:var(--mono);font-size:.8rem;color:var(--faint)}

    .btn-group{display:flex;gap:.5rem}
    .btn-group button{flex:1;margin:0}

    .course-input{font-family:var(--mono);font-size:.85rem}

    .back-link{display:inline-block;margin-bottom:2rem;color:var(--accent);text-decoration:none;font-size:.9rem}
    .back-link:hover{text-decoration:underline}

    .success{background:#c8deca;color:#1a5e1f;padding:1rem;border-radius:2px;margin-bottom:1rem;border-left:4px solid var(--accent)}
    .error{background:var(--error-bg);color:#b71c1c;padding:1rem;border-radius:2px;margin-bottom:1rem;border-left:4px solid var(--error)}

    @media(max-width:600px){
      .form-row{grid-template-columns:1fr}
      .btn-group{flex-direction:column}
      .student-item{flex-direction:column;align-items:flex-start;gap:1rem}
    }
  </style>
</head>

      </div>

    </div>

    </div>

    <!-- Students List -->

      if (auth === 'true') {

        showContent();
      } else {
        showError('Incorrect password');
        document.getElementById('passwordInput').value = '';
      }
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
    }

    function showContent() {
      document.getElementById('passwordScreen').classList.add('hidden');
      document.getElementById('contentArea').style.display = 'block';
      renderStudents();
    }

    function showMessage(msg, type = 'success') {
      const elem = document.getElementById('message');
      elem.className = type;
      elem.textContent = msg;
      setTimeout(() => elem.textContent = '', 3000);
    }

    function renderStudents() {
      const students = JSON.parse(localStorage.getItem('advisingStudents')) || [];
      const list = document.getElementById('studentsList');
      const editContainer = document.getElementById('editPlansContainer');

      list.innerHTML = '';
      editContainer.innerHTML = '';

      students.forEach(student => {
        // List item
        const item = document.createElement('li');
        item.className = 'student-item';
        const majorLabels = {
          'math-bs': 'Mathematics, BS',
          'math-ba': 'Mathematics, BA',
          'math-actuarial': 'Actuarial & Financial Math',
          'math-datasci': 'Data Science',
          'math-ed': 'Mathematics Education'
        };
        const majorDisplay = student.major ? majorLabels[student.major] || student.major : 'No major';
        item.innerHTML = `
          <div class="student-info">
            <div class="student-name">${student.name}</div>
            <div class="student-pwd">Major: ${majorDisplay} · Password: ${student.password}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="editStudent(${student.id})">Edit Plan</button>
            <button class="btn btn-danger" onclick="deleteStudent(${student.id})">Delete</button>
          </div>
        `;
        list.appendChild(item);

        // Edit form (hidden by default)
        const form = document.createElement('div');
        form.id = `form-${student.id}`;
        form.style.display = 'none';
        form.className = 'section';
        
        const semesters = ['freshmanFall', 'freshmanSpring', 'sophomoreFall', 'sophomoreSpring', 'juniorFall', 'juniorSpring', 'seniorFall', 'seniorSpring'];
        const semesterLabels = {
          freshmanFall: 'Freshman Fall',
          freshmanSpring: 'Freshman Spring',
          sophomoreFall: 'Sophomore Fall',
          sophomoreSpring: 'Sophomore Spring',
          juniorFall: 'Junior Fall',
          juniorSpring: 'Junior Spring',
          seniorFall: 'Senior Fall',
          seniorSpring: 'Senior Spring'
        };
        
        let semesterInputs = '';
        semesters.forEach(sem => {
          const courses = (student.plan[sem] || []).map(c => `${c.code || ''}|${c.name || ''}|${c.units}`).join(', ');
          semesterInputs += `
            <label>${semesterLabels[sem]} Courses</label>
            <p style="font-size:.8rem;color:var(--faint);margin-bottom:.4rem">Format: Course Code|Course Name|Units (e.g., MATH 1033|Calculus I|3)</p>
            <textarea class="course-input" id="${sem}-${student.id}" rows="2">${courses}</textarea>
          `;
        });
        
        form.innerHTML = `
          <h3>${student.name} - Edit Plan</h3>
          <label>New Password (leave blank to keep current)</label>
          <input type="text" id="password-${student.id}" placeholder="Current: ${student.password}" style="margin-bottom:1rem">
          <label>Major</label>
          <select id="major-${student.id}" style="margin-bottom:1.5rem">
            <option value="">-- Select Major --</option>
            <option value="math-bs" ${student.major === 'math-bs' ? 'selected' : ''}>Mathematics, BS</option>
            <option value="math-ba" ${student.major === 'math-ba' ? 'selected' : ''}>Mathematics, BA</option>
            <option value="math-actuarial" ${student.major === 'math-actuarial' ? 'selected' : ''}>Applied Mathematics: Actuarial & Financial Math, BS</option>
            <option value="math-datasci" ${student.major === 'math-datasci' ? 'selected' : ''}>Applied Mathematics: Data Science, BS</option>
            <option value="math-ed" ${student.major === 'math-ed' ? 'selected' : ''}>Mathematics Education, Secondary, BSE</option>
          </select>
          ${semesterInputs}
          <div style="display:flex;gap:1rem;margin-top:1.5rem">
            <button class="btn" onclick="savePlan(${student.id})">Save Changes</button>
            <button class="btn btn-secondary" onclick="cancelEdit(${student.id})">Cancel</button>
          </div>
        `;
        editContainer.appendChild(form);
      });
    }

    function addStudent() {
      const name = document.getElementById('newName').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const majorTemplate = document.getElementById('majorTemplate').value;

      if (!name || !password) {
        showMessage('Please fill in name and password', 'error');
        return;
      }

      const students = JSON.parse(localStorage.getItem('advisingStudents')) || [];
      const newId = Math.max(...students.map(s => s.id), 0) + 1;

      // Get plan from template or empty plan
      let plan = {
        freshmanFall: [],
        freshmanSpring: [],
        sophomoreFall: [],
        sophomoreSpring: [],
        juniorFall: [],
        juniorSpring: [],
        seniorFall: [],
        seniorSpring: []
      };

      if (majorTemplate && degreePlans[majorTemplate]) {
        // Deep copy the template plan
        const template = degreePlans[majorTemplate];
        Object.keys(plan).forEach(sem => {
          plan[sem] = JSON.parse(JSON.stringify(template.plan[sem]));
        });
      }

      const newStudent = {
        id: newId,
        name: name,
        password: password,
        major: majorTemplate || null,
        plan: plan
      };

      students.push(newStudent);
      localStorage.setItem('advisingStudents', JSON.stringify(students));

      document.getElementById('newName').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('majorTemplate').value = '';

      renderStudents();
      showMessage(`Student "${name}" added successfully!`);
    }

    function editStudent(id) {
      document.getElementById(`form-${id}`).style.display = 'block';
    }

    function cancelEdit(id) {
      document.getElementById(`form-${id}`).style.display = 'none';
    }

    function savePlan(id) {
      const students = JSON.parse(localStorage.getItem('advisingStudents')) || [];
      const student = students.find(s => s.id === id);

      if (student) {
        // Update password if provided
        const newPassword = document.getElementById(`password-${id}`).value.trim();
        if (newPassword) {
          student.password = newPassword;
        }

        // Update major
        const newMajor = document.getElementById(`major-${id}`).value;
        if (newMajor) {
          student.major = newMajor;
        }

        // Update semester plans
        const semesters = ['freshmanFall', 'freshmanSpring', 'sophomoreFall', 'sophomoreSpring', 'juniorFall', 'juniorSpring', 'seniorFall', 'seniorSpring'];
        
        semesters.forEach(sem => {
          const input = document.getElementById(`${sem}-${id}`).value.trim();
          if (input) {
            student.plan[sem] = input.split(',').map(item => {
              const parts = item.trim().split('|');
              return {
                code: parts[0]?.trim() || '',
                name: parts[1]?.trim() || '',
                units: parseInt(parts[2]) || 3
              };
            }).filter(c => c.name || c.code);
          } else {
            student.plan[sem] = [];
          }
        });

        localStorage.setItem('advisingStudents', JSON.stringify(students));
        cancelEdit(id);
        renderStudents();
        showMessage('Plan updated successfully!');
      }
    }

    function deleteStudent(id) {
      if (confirm('Are you sure you want to delete this student?')) {
        let students = JSON.parse(localStorage.getItem('advisingStudents')) || [];
        students = students.filter(s => s.id !== id);
        localStorage.setItem('advisingStudents', JSON.stringify(students));
        renderStudents();
        showMessage('Student deleted');
      }
    }

    renderStudents();

    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
      });
      checkAuthentication();
    });
  </script>
</body>
</html>
