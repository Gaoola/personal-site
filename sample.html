      --gold:#a07820;--gold-bg:#fdf6e3;--gold-border:#e8d49a;
      --serif:'DM Serif Display',Georgia,serif;
      --sans:'DM Sans',sans-serif;
      --mono:'DM Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;font-weight:300;line-height:1.75;overflow-x:hidden;min-height:100vh}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 4rem;background:rgba(247,243,238,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .nav-name{font-family:var(--sans);font-size:.95rem;font-weight:600;letter-spacing:-.01em;color:var(--text);text-decoration:none}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--muted);transition:all .2s}
    .nav-links a:hover{color:var(--accent)}

    .page-hero{padding:8rem 4rem 2rem;border-bottom:1px solid var(--border)}
    .hero-label{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
    .hero-label::before{content:'';display:block;width:24px;height:1px;background:var(--accent)}
    .page-title{font-family:var(--serif);font-size:clamp(2.4rem,5vw,3.8rem);font-weight:400;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem}
    .page-sub{font-size:.95rem;color:var(--muted);margin-bottom:2rem}

    .page-body{padding:3rem 4rem 5rem}

    .plan-grid{display:flex;flex-direction:column;gap:1.5rem;margin-top:2rem}
    .year-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.4rem;
      transition:all .2s;
    }
    .year-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(45,110,53,.1)}
    .year-title{font-family:var(--serif);font-size:1.1rem;margin-bottom:1rem;color:var(--accent)}
    .course-list{list-style:none}
    .course-item{
      padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.95rem;color:var(--muted);
      display:flex;align-items:center;gap:.6rem;
    }
    .course-item:last-child{border-bottom:none}
    .course-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}

    .back-btn{
      display:inline-block;padding:.6rem 1.4rem;background:transparent;border:1.5px solid var(--border);
      border-radius:2px;color:var(--muted);text-decoration:none;font-size:.8rem;
      font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all .2s;
      margin-top:2rem;
    }
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* Progress Bar */
    .progress-section{margin-bottom:2.5rem}
    .progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
    .progress-title{font-family:var(--mono);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .progress-stats{font-family:var(--mono);font-size:.85rem;color:var(--accent);font-weight:500}
    .progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
    .page-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap}
    .page-title-row .page-title{margin-bottom:0}
    .page-title-row .progress-section{margin-bottom:0;min-width:280px}

    /* Course Table */
    .course-table{width:100%;border-collapse:collapse;margin-top:.8rem}
    .course-table th{text-align:left;font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:.6rem 0;border-bottom:1px solid var(--border)}
    .course-table td{padding:.7rem 0;border-bottom:1px solid var(--border);font-size:.95rem;color:var(--text)}
    .course-table td:first-child{font-weight:500;width:120px}
    .course-table td:nth-child(2){text-align:center;font-style:italic;color:var(--muted)}
    .course-table td:last-child{text-align:right;font-family:var(--mono);font-size:.85rem;color:var(--muted);width:60px}
    .course-table tr:last-child td{border-bottom:none}

    footer{padding:1.6rem 4rem;border-top:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between;align-items:center}
    footer p{font-family:var(--mono);font-size:.7rem;color:var(--faint)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:900px){
      nav{padding:1rem 1.5rem}
      .page-hero,.page-body{padding-left:1.8rem;padding-right:1.8rem}
      footer{flex-direction:column;gap:.4rem;padding:1.2rem 1.8rem;text-align:center}
    }

    @media(max-width:600px){

    function renderPlan() {
      const major = degreePlans[majorId];
      if (!major) {
        document.getElementById('majorName').textContent = 'Sample Not Found';
        return;
      }

      document.getElementById('majorName').textContent = major.name;
      document.getElementById('majorSubtitle').textContent = `${major.subtitle} — Oklahoma Baptist University`;

      const grid = document.getElementById('planGrid');
      const progressSection = document.getElementById('progressSection');
      grid.innerHTML = '';

      // Calculate total units
      let totalUnits = 0;
      const semesters = ['freshmanFall', 'freshmanSpring', 'sophomoreFall', 'sophomoreSpring', 'juniorFall', 'juniorSpring', 'seniorFall', 'seniorSpring'];
      semesters.forEach(sem => {
        const courses = major.plan[sem] || [];
        courses.forEach(c => {
          const units = parseInt(c.units) || 3;
          totalUnits += units;
        });
      });

      const requiredUnits = 120;
      const progressPercent = Math.min((totalUnits / requiredUnits) * 100, 100);

      // Progress bar in header
      progressSection.innerHTML = `
        <div class="progress-section">
          <div class="progress-label">
            <span class="progress-title">Degree Progress</span>
            <span class="progress-stats">${totalUnits} / ${requiredUnits} units</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progressPercent}%"></div>
          </div>
        </div>
      `;

      const semesterLabels = {
        freshmanFall: 'Freshman Fall',
        freshmanSpring: 'Freshman Spring',
        sophomoreFall: 'Sophomore Fall',
        sophomoreSpring: 'Sophomore Spring',
        juniorFall: 'Junior Fall',
        juniorSpring: 'Junior Spring',
        seniorFall: 'Senior Fall',
        seniorSpring: 'Senior Spring'
      };

      // Create 4 rows, each with 2 columns
      const yearRows = [
        ['freshmanFall', 'freshmanSpring'],
        ['sophomoreFall', 'sophomoreSpring'],
        ['juniorFall', 'juniorSpring'],
        ['seniorFall', 'seniorSpring']
      ];

      yearRows.forEach((rowSemesters, rowIdx) => {
        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.gap = '1.5rem';
        row.style.width = '100%';
        if (rowIdx > 0) row.style.marginTop = '1.5rem';

        rowSemesters.forEach(sem => {
          const courses = major.plan[sem] || [];
          const card = document.createElement('div');
          card.className = 'year-card';
          card.style.flex = '1 1 50%';
          card.style.minWidth = '0';
          
          let coursesHTML = '';
          if (courses.length > 0) {
            coursesHTML = `
              <table class="course-table">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Course Name</th>
                    <th>Units</th>
                  </tr>
                </thead>
                <tbody>
                  ${courses.map(course => `
                    <tr>
                      <td>${course.code || ''}</td>
                      <td>${course.name || ''}</td>
                      <td>${course.units}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `;
          } else {
            coursesHTML = '<p style="color:var(--faint);font-style:italic;margin-top:.8rem">No courses added</p>';
          }

          card.innerHTML = `
            <h3 class="year-title">${semesterLabels[sem]}</h3>
            ${coursesHTML}
          `;
          row.appendChild(card);
        });

        grid.appendChild(row);
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', renderPlan);
  </script>
</body>
</html>
